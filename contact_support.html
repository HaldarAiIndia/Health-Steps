<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support - Health Steps</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <!-- Link to the provided CSS -->
    <link rel="stylesheet" href="aistudio_Style.css">
    <!-- Fonts and Icons mapping to the CSS variables -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
    <style>
        .container {
            max-width: 600px;
            margin: 60px auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }
        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        .contact-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .contact-item:last-child {
            margin-bottom: 0;
        }
        .contact-icon {
            background-color: var(--bg-tertiary);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-active);
        }
        .contact-info-block h3 {
            font-size: 1rem;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }
        .contact-info-block a, .contact-info-block p {
            font-size: 1.1rem;
            color: var(--text-primary);
            font-weight: 500;
        }
        .contact-info-block a {
            transition: color 0.2s;
        }
        .contact-info-block a:hover {
            color: var(--text-active);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            margin-top: 40px;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--text-active);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="main-wrapper">
            <div class="content-area" style="overflow-y: auto;">
                <div class="container">
                    <div class="header">
                        <h1>Contact Support</h1>
                        <p>We're here to help you step forward.</p>
                    </div>

                    <div class="contact-card">
                        <div class="contact-item">
                            <div class="contact-icon">
                                <span class="material-symbols-outlined">email</span>
                            </div>
                            <div class="contact-info-block">
                                <h3>Email Us</h3>
                                <a href="mailto:business.tizongaming@gmail.com">business.tizongaming@gmail.com</a>
                            </div>
                        </div>
                        
                        <div style="height: 1px; background-color: var(--border-color); margin: 24px 0;"></div>

                        <div class="contact-item">
                            <div class="contact-icon">
                                <span class="material-symbols-outlined">call</span>
                            </div>
                            <div class="contact-info-block">
                                <h3>Call Us</h3>
                                <a href="tel:+918637856826">+91 8637856826</a>
                            </div>
                        </div>

                        <div style="height: 1px; background-color: var(--border-color); margin: 24px 0;"></div>

                        <div class="contact-item">
                            <div class="contact-icon">
                                <span class="material-symbols-outlined">location_on</span>
                            </div>
                            <div class="contact-info-block">
                                <h3>Location</h3>
                                <p>SUBHOJIT HALDAR<br>West Bengal, India</p>
                            </div>
                        </div>
                    </div>

                    <div style="text-align: center;">
                        <a href="index.html" class="back-link">
                            <span class="material-symbols-outlined">arrow_back</span>
                            Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
